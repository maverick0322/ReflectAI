page:
  layout: portrait
  margin: [1in, 1in, 1in, 1in]
  size: A4
header:
  height: 0.75in
  line_width: 0.25
  recto:
    right:
      content: '{document-title}'
  verso:
    left:
      content: '{document-title}'
footer:
  height: 0.75in
  line_width: 0.25
  recto:
    right:
      content: '{page-number}'
  verso:
    left:
      content: '{page-number}'
base:
  font_color: #333333
  font_family: Noto Serif
  font_size: 11
  line_height_length: 12
  line_height: 1.15
heading:
  font_color: #1a1a1a
  font_style: bold
  h1_font_size: 24
  h2_font_size: 20
  h3_font_size: 16
  h4_font_size: 14
link:
  font_color: #0066cc
code:
  font_color: #aa1111
  font_family: Courier
  background_color: #f5f5f5
  border_color: #cccccc
  border_radius: 5
  border_width: 0.5
  padding: [2, 3]
table:
  border_color: #dddddd
  border_width: 0.5
  head:
    background_color: #f2f2f2
    font_color: #1a1a1a
    font_style: bold
  body:
    background_color: #ffffff
    font_color: #333333
caption:
  font_color: #666666
  font_size: 9
  font_style: italic
  align: center
  side: bottom